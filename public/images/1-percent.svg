<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Define grid size -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="none" stroke="black" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Draw grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Fill the top-left cell with coffee color -->
  <rect x="0" y="0" width="60" height="60" fill="#6F4E37" />
</svg>
